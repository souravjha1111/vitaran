{% extends "home/base.html" %}
{% block content %}

        {% for order in orders %}
        <article class="media content-section">
          <img class="rounded-circle article-img" src="{{ order.author.profile.image.url }}">
          <div class="media-body">
            <div class="article-metadata">
              <small class="text-muted">{{ order.user }}</small>
            </div>
            <a href="order_bid">{{ order.description }}</a>
            <br>
            <small class="text-muted">{{ order.order_from }}</small> -> <small class="text-muted">{{ order.order_to }}</small>
          <br>
          </div>             
          Weight of lot :{{ order.approx_weight}} kg
          <br>
           size of lot:{{ order.approx_size}} 
        </article>

    {% endfor %}
      {% endblock content %}
